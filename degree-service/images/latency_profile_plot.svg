<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
    <rect width="600" height="200" fill="#ffffff" rx="10"/>
    <text x="300" y="40" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#333333">Execution Latency Profiling (Average Times)</text>
    
    <!-- Legend -->
    <rect x="50" y="70" width="15" height="15" fill="#4CAF50" rx="2"/>
    <text x="75" y="82" font-family="Arial" font-size="12" fill="#333333">AST Filter (59ms)</text>
    
    <rect x="200" y="70" width="15" height="15" fill="#2196F3" rx="2"/>
    <text x="225" y="82" font-family="Arial" font-size="12" fill="#333333">Vectorization (25ms)</text>
    
    <rect x="360" y="70" width="15" height="15" fill="#FF9800" rx="2"/>
    <text x="385" y="82" font-family="Arial" font-size="12" fill="#333333">Gemini LLM (1520ms)</text>

    <!-- Stacked Bar -->
    <!-- AST (18.3px) -->
    <rect x="50" y="120" width="18" height="40" fill="#4CAF50"/>
    
    <!-- Vec (7.7px) -->
    <rect x="68" y="120" width="8" height="40" fill="#2196F3"/>
    
    <!-- LLM (474px) -->
    <rect x="76" y="120" width="474" height="40" fill="#FF9800"/>
    
    <text x="313" y="145" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">LLM Generation Network Call (1,520 ms)</text>
    
    <!-- X Axis -->
    <line x1="50" y1="170" x2="550" y2="170" stroke="#cccccc" stroke-width="2"/>
    <text x="50" y="185" font-family="Arial" font-size="10" text-anchor="middle" fill="#666666">0ms</text>
    <text x="550" y="185" font-family="Arial" font-size="10" text-anchor="middle" fill="#666666">1603ms</text>
</svg>