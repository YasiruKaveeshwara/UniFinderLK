name: Deploy Degree Service to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "degree-service/**"
      - ".github/workflows/deploy-degree-service-huggingface.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync degree service to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_REPO" ]; then
            echo "Missing HF_TOKEN or HF_SPACE_REPO secret"
            exit 1
          fi

          rm -rf /tmp/hf-space
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" /tmp/hf-space

          rsync -a --delete \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '.mypy_cache' \
            --exclude '.cache' \
            --exclude 'docs' \
            --exclude 'tests' \
            --exclude 'results' \
            --exclude '.env' \
            --exclude '.env.*' \
            degree-service/ /tmp/hf-space/

          cd /tmp/hf-space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Deploy degree service"
          git push
